[phases.setup]
nixPkgs = [
  "php82",
  "php82Extensions.pdo",
  "php82Extensions.pdo_mysql",
  "php82Extensions.mbstring",
  "php82Extensions.xml",
  "php82Extensions.curl",
  "php82Extensions.zip",
  "php82Extensions.bcmath",
  "php82Extensions.tokenizer",
  "php82Extensions.fileinfo",
  "php82Extensions.openssl",
  "php82Extensions.gd", # Added GD for your spreadsheets!
  "php82Extensions.intl", # Added for Laravel requirements
  "composer",
  "nodejs_20", # Added for your NPM assets
  "npm"
]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader", "npm ci", "npm run build"]

[phases.build] 
cmds = [
  "php artisan config:cache",
  "php artisan view:cache"
]

[start]
# starting a PHP app in Nixpacks
cmd = "php artisan migrate --force && frankenphp php-server --listen :8080 --root public/"